<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול תפריט</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; direction: rtl; margin: 0; }

        .screen { display: none; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 420px; width: 100%; text-align: center; }
        .login-card h2 { margin-top: 0; font-size: 1.5rem; }
        .login-card p  { color: #555; margin-bottom: 20px; font-size: 0.95rem; }
        .login-card input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1rem; margin-bottom: 12px; }
        .login-card input[type=email]    { direction: ltr; text-align: left; }
        .login-card input[type=password] { direction: ltr; text-align: left; }

        .admin-card { max-width: 820px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; }
        .status-bar { background: #2c3e50; color: white; padding: 10px 15px; border-radius: 8px; font-size: 0.9em; flex-grow: 1; }

        .form-and-preview { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; background: #fafafa; padding: 20px; border-radius: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input[type=text], input[type=number], select, textarea {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc;
            box-sizing: border-box; font-family: inherit; font-size: 0.95rem;
        }
        textarea { resize: vertical; min-height: 80px; }

        .types-group { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; background: white; border: 1px solid #ccc; border-radius: 8px; min-height: 44px; }
        .type-checkbox { display: flex; align-items: center; gap: 5px; font-weight: normal; cursor: pointer; font-size: 0.9rem; }
        .type-checkbox input { width: auto; }

        .preview-area { display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed #ddd; border-radius: 10px; background: #fff; cursor: pointer; min-height: 160px; overflow: hidden; transition: border-color 0.2s; }
        .preview-area:hover { border-color: #b38e5d; }
        .preview-placeholder { color: #aaa; font-size: 2rem; line-height: 1; }
        .preview-placeholder span { display: block; font-size: 0.8rem; margin-top: 5px; }
        .preview-img-big { max-width: 100%; max-height: 250px; border-radius: 8px; display: none; }

        .btn { width: 100%; padding: 13px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 0.95rem; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.88; }
        .btn-add    { background: #27ae60; color: white; }
        .btn-update { background: #2980b9; color: white; display: none; }
        .btn-cancel { background: #ecf0f1; color: #333; display: none; margin-top: 8px; }
        .btn-import { background: #8e44ad; color: white; margin-top: 8px; }
        .btn-logout { background: #e74c3c; color: white; padding: 9px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }

        .category-group { margin-top: 10px; border: 1px solid #eee; border-radius: 10px; overflow: hidden; }
        .category-header { background: #34495e; color: white; padding: 14px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; user-select: none; }
        .category-content { display: none; background: white; }
        .category-group.active .category-content { display: block; }
        .item-row { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f1f1f1; gap: 12px; }
        .item-row:last-child { border-bottom: none; }
        .item-img  { width: 52px; height: 52px; object-fit: cover; border-radius: 8px; flex-shrink: 0; background: #eee; }
        .item-info { flex-grow: 1; font-size: 0.95rem; }
        .item-types { font-size: 0.75rem; color: #b38e5d; margin-top: 3px; }
        .btn-edit   { background: #f39c12; color: white; border: none; padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .no-items { text-align: center; padding: 25px; color: #bbb; font-style: italic; }
        .error { color: #e74c3c; font-size: 0.85rem; min-height: 1.2em; margin-bottom: 6px; }

        @media (max-width: 560px) {
            .form-and-preview { grid-template-columns: 1fr; }
            .preview-area { min-height: 120px; }
        }
    </style>
</head>
<body>

<!-- מסך כניסה -->
<div id="login-screen" class="screen active">
    <div class="login-card">
        <h2>🔐 כניסה לניהול</h2>
        <p>הכנס אימייל וסיסמא שהוגדרו ב-Firebase.</p>
        <input type="email"    id="emailInput"    placeholder="אימייל" onkeydown="if(event.key==='Enter') document.getElementById('passwordInput').focus()">
        <input type="password" id="passwordInput" placeholder="סיסמא" onkeydown="if(event.key==='Enter') login()">
        <div id="loginError" class="error"></div>
        <button class="btn btn-add" onclick="login()">התחבר</button>
    </div>
</div>

<!-- ממשק ניהול -->
<div id="admin-screen" style="display:none">
    <div class="admin-card">
        <div class="admin-header">
            <div class="status-bar" id="statusMsg">מתחבר...</div>
            <button class="btn-logout" onclick="logout()">התנתק</button>
        </div>
        <h2 style="margin-top:0">🛠️ ניהול תפריט</h2>

        <div id="editor-form">
            <input type="hidden" id="editKey">
            <div class="form-and-preview">
                <div class="form-grid">
                    <div>
                        <label for="itemName">שם המנה:</label>
                        <input type="text" id="itemName" placeholder="לדוגמה: סושי פצצה">
                    </div>
                    <div>
                        <label for="itemPrice">מחיר (₪):</label>
                        <input type="number" id="itemPrice" min="0" step="0.5" placeholder="0">
                    </div>
                    <div>
                        <label for="itemCategory">קטגוריה:</label>
                        <select id="itemCategory"></select>
                    </div>
                    <div>
                        <label>סוגים:</label>
                        <div class="types-group" id="typesGroup"></div>
                    </div>
                    <div>
                        <label for="itemDesc">תיאור המנה:</label>
                        <textarea id="itemDesc" placeholder="תיאור קצר של המנה..."></textarea>
                    </div>
                </div>
                <div class="preview-area" onclick="document.getElementById('imageFile').click()" title="לחץ לבחירת תמונה">
                    <div id="previewPlaceholder" class="preview-placeholder">📷<span>לחץ לתמונה</span></div>
                    <img src="" class="preview-img-big" id="previewImgBig" alt="תצוגה מקדימה">
                    <input type="file" id="imageFile" accept="image/*" style="display:none" onchange="handleFile(this)">
                </div>
            </div>
            <button id="addBtn"    class="btn btn-add"    onclick="addItem()">➕ הוסף ושמור</button>
            <button id="updateBtn" class="btn btn-update" onclick="updateItem()">💾 שמור שינויים</button>
            <button id="cancelBtn" class="btn btn-cancel" onclick="resetForm()">ביטול</button>
            <button id="importBtn" class="btn btn-import" onclick="importFromGitHub()" title="ייבוא חד-פעמי מ-GitHub">📥 ייבוא נתונים קיימים מ-GitHub</button>
        </div>

        <hr style="margin: 30px 0; border: none; border-top: 1px solid #eee;">
        <div id="accordion-container"></div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

<script>
    // ── הכנס כאן את פרטי הפרויקט מ-Firebase Console ─────────────────────
    const firebaseConfig = {
        apiKey:        'YOUR_API_KEY',
        authDomain:    'YOUR_PROJECT_ID.firebaseapp.com',
        databaseURL:   'https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com',
        storageBucket: 'YOUR_PROJECT_ID.appspot.com',
    };
    // ─────────────────────────────────────────────────────────────────────

    firebase.initializeApp(firebaseConfig);
    const auth     = firebase.auth();
    const menuRef  = firebase.database().ref('menu');
    const storage  = firebase.storage();

    const GITHUB_RAW = 'https://raw.githubusercontent.com/BigDadies-55/My-Rest/main/menu_db.json';

    let menu         = { settings: {}, categories: [], items: {}, types: [] };
    let pendingImage = null;

    // ---- Auth ----

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('admin-screen').style.display = 'block';
            loadFromFirebase();
        } else {
            document.getElementById('admin-screen').style.display = 'none';
            document.getElementById('login-screen').classList.add('active');
        }
    });

    async function login() {
        const email    = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('passwordInput').value;
        const errorEl  = document.getElementById('loginError');
        errorEl.textContent = '';
        if (!email || !password) { errorEl.textContent = 'אנא מלא אימייל וסיסמא.'; return; }
        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch {
            errorEl.textContent = '❌ אימייל או סיסמא שגויים.';
            document.getElementById('passwordInput').value = '';
        }
    }

    function logout() { auth.signOut(); }

    // ---- Firebase DB ----

    function setStatus(msg) { document.getElementById('statusMsg').textContent = msg; }

    async function loadFromFirebase() {
        setStatus('⏳ מתחבר ל-Firebase...');
        try {
            const snap = await menuRef.once('value');
            menu = snap.val() || { settings: {}, categories: [], items: {}, types: [] };
            setStatus('✅ מחובר ומסונכרן');
            populateCategorySelect();
            populateTypes();
            renderItems();
        } catch (e) {
            console.error(e);
            setStatus('❌ שגיאה בחיבור — בדוק את הגדרות Firebase');
        }
    }

    async function saveToFirebase() {
        setStatus('⏳ שומר...');
        try {
            await menuRef.set(menu);
            setStatus('✅ נשמר בהצלחה!');
            renderItems();
        } catch (e) {
            console.error(e);
            setStatus('❌ שגיאת שמירה');
            throw e;
        }
    }

    async function importFromGitHub() {
        if (!confirm('ייבוא ידרוס את הנתונים הנוכחיים ב-Firebase. להמשיך?')) return;
        setStatus('⏳ מייבא נתונים מ-GitHub...');
        try {
            const res  = await fetch(`${GITHUB_RAW}?v=${Date.now()}`);
            const data = await res.json();
            const itemsObj = {};
            (data.items || []).forEach(item => { itemsObj[`item_${item.id}`] = item; });
            menu = {
                settings:   data.settings   || {},
                categories: data.categories || [],
                types:      data.types       || [],
                items:      itemsObj,
            };
            await menuRef.set(menu);
            setStatus('✅ ייבוא הושלם בהצלחה!');
            document.getElementById('importBtn').style.display = 'none';
            populateCategorySelect();
            populateTypes();
            renderItems();
        } catch (e) {
            console.error(e);
            setStatus('❌ שגיאה בייבוא');
        }
    }

    async function uploadImage(base64DataUrl) {
        const filename = `images/img_${Date.now()}_${Math.random().toString(36).slice(2, 7)}.jpg`;
        const base64   = base64DataUrl.split(',')[1];
        const ref      = storage.ref(filename);
        await ref.putString(base64, 'base64', { contentType: 'image/jpeg' });
        return await ref.getDownloadURL();
    }

    function handleFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_W  = 800;
                let w = img.width, h = img.height;
                if (w > MAX_W) { h = Math.round(h * MAX_W / w); w = MAX_W; }
                canvas.width  = w;
                canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                pendingImage = canvas.toDataURL('image/jpeg', 0.7);
                showPreview(pendingImage);
            };
        };
        reader.readAsDataURL(file);
    }

    function showPreview(src) {
        const imgEl = document.getElementById('previewImgBig');
        const ph    = document.getElementById('previewPlaceholder');
        imgEl.src           = src || '';
        imgEl.style.display = src ? 'block' : 'none';
        ph.style.display    = src ? 'none'  : 'block';
    }

    function escAttr(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
    function escText(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function itemsArray() {
        return Object.values(menu.items || {}).sort((a, b) => a.id - b.id);
    }

    function resolveImg(item) {
        if (item.imageUrl) return item.imageUrl;
        if (item.image)    return `https://raw.githubusercontent.com/BigDadies-55/My-Rest/main/images/${item.image}`;
        return '';
    }

    function populateCategorySelect(selected) {
        const sel = document.getElementById('itemCategory');
        sel.innerHTML = (menu.categories || []).map(c =>
            `<option value="${escAttr(c)}"${c === selected ? ' selected' : ''}>${escText(c)}</option>`
        ).join('');
    }

    function populateTypes(selectedTypes = []) {
        document.getElementById('typesGroup').innerHTML = (menu.types || []).map(t =>
            `<label class="type-checkbox">
                <input type="checkbox" value="${escAttr(t)}"${selectedTypes.includes(t) ? ' checked' : ''}> ${escText(t)}
            </label>`
        ).join('');
    }

    function getSelectedTypes() {
        return Array.from(document.querySelectorAll('#typesGroup input:checked')).map(cb => cb.value);
    }

    function validateForm() {
        const name  = document.getElementById('itemName').value.trim();
        const price = parseFloat(document.getElementById('itemPrice').value);
        if (!name)                     { alert('אנא הכנס שם מנה');    return null; }
        if (isNaN(price) || price < 0) { alert('אנא הכנס מחיר תקין'); return null; }
        return {
            name, price,
            category: document.getElementById('itemCategory').value,
            desc:     document.getElementById('itemDesc').value.trim(),
            types:    getSelectedTypes(),
        };
    }

    async function addItem() {
        const fields = validateForm();
        if (!fields) return;
        try {
            let imageUrl = '';
            if (pendingImage) {
                setStatus('⏳ מעלה תמונה...');
                imageUrl = await uploadImage(pendingImage);
            }
            const id  = Date.now();
            const key = `item_${id}`;
            menu.items = menu.items || {};
            menu.items[key] = { id, ...fields, imageUrl };
            await saveToFirebase();
            resetForm();
        } catch (e) {
            console.error(e);
            setStatus('❌ שגיאה');
        }
    }

    function startEdit(key) {
        const item = menu.items[key];
        if (!item) return;
        document.getElementById('editKey').value   = key;
        document.getElementById('itemName').value  = item.name;
        document.getElementById('itemPrice').value = item.price;
        document.getElementById('itemDesc').value  = item.desc || '';
        pendingImage = null;
        populateCategorySelect(item.category);
        populateTypes(item.types || []);
        showPreview(resolveImg(item));
        document.getElementById('imageFile').value         = '';
        document.getElementById('addBtn').style.display    = 'none';
        document.getElementById('updateBtn').style.display = 'block';
        document.getElementById('cancelBtn').style.display = 'block';
        document.getElementById('editor-form').scrollIntoView({ behavior: 'smooth' });
    }

    async function updateItem() {
        const fields = validateForm();
        if (!fields) return;
        const key = document.getElementById('editKey').value;
        if (!key || !menu.items[key]) return;
        try {
            let imageUrl = menu.items[key].imageUrl || '';
            if (pendingImage) {
                setStatus('⏳ מעלה תמונה...');
                imageUrl = await uploadImage(pendingImage);
            }
            menu.items[key] = { ...menu.items[key], ...fields, imageUrl };
            await saveToFirebase();
            resetForm();
        } catch (e) {
            console.error(e);
            setStatus('❌ שגיאה בשמירה');
        }
    }

    async function deleteItem(key) {
        if (!confirm('האם למחוק מנה זו?')) return;
        const backup = { ...menu.items };
        try {
            if (document.getElementById('editKey').value === key) resetForm();
            delete menu.items[key];
            await saveToFirebase();
        } catch (e) {
            menu.items = backup;
            console.error(e);
            setStatus('❌ שגיאה במחיקה');
            renderItems();
        }
    }

    function resetForm() {
        document.getElementById('editKey').value   = '';
        document.getElementById('itemName').value  = '';
        document.getElementById('itemPrice').value = '';
        document.getElementById('itemDesc').value  = '';
        document.getElementById('imageFile').value = '';
        pendingImage = null;
        showPreview('');
        populateCategorySelect();
        populateTypes();
        document.getElementById('addBtn').style.display    = 'block';
        document.getElementById('updateBtn').style.display = 'none';
        document.getElementById('cancelBtn').style.display = 'none';
    }

    function renderItems() {
        const container = document.getElementById('accordion-container');
        container.innerHTML = '';
        const allItems = itemsArray();
        const grouped  = allItems.reduce((acc, item) => {
            (acc[item.category] = acc[item.category] || []).push(item);
            return acc;
        }, {});

        (menu.categories || []).forEach(cat => {
            const items = grouped[cat] || [];
            const div   = document.createElement('div');
            div.className = 'category-group';
            const itemsHtml = items.length === 0
                ? `<p class="no-items">אין מנות בקטגוריה זו</p>`
                : items.map(item => {
                    const key       = `item_${item.id}`;
                    const imgSrc    = resolveImg(item);
                    const typesText = (item.types || []).join(' · ');
                    return `
                        <div class="item-row">
                            ${imgSrc ? `<img src="${escAttr(imgSrc)}" class="item-img" alt="${escAttr(item.name)}">` : `<div class="item-img"></div>`}
                            <div class="item-info">
                                <strong>${escText(item.name)}</strong> — &#8362;${escText(String(item.price))}
                                ${typesText ? `<div class="item-types">${escText(typesText)}</div>` : ''}
                            </div>
                            <button class="btn-edit"   data-key="${escAttr(key)}" data-action="edit">ערוך</button>
                            <button class="btn-delete" data-key="${escAttr(key)}" data-action="delete">מחק</button>
                        </div>`;
                }).join('');
            div.innerHTML = `
                <div class="category-header" onclick="this.parentElement.classList.toggle('active')">
                    <span>${escText(cat)} (${items.length})</span><span>▼</span>
                </div>
                <div class="category-content">${itemsHtml}</div>`;
            container.appendChild(div);
        });
    }

    document.getElementById('accordion-container').addEventListener('click', e => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const key = btn.dataset.key;
        if (btn.dataset.action === 'edit')        startEdit(key);
        else if (btn.dataset.action === 'delete') deleteItem(key);
    });
</script>
</body>
</html>
